[project]
name = "tiny-teams-with-tokens"
version = "0.0.1"
description = "Status reports for AI-assisted engineering teams, generated from GitHub, Confluence, and Webex"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlmodel>=0.0.22",
    "anthropic>=0.40",
    "pydantic-settings>=2.6",
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "claude-agent-sdk>=0.1.71",
]

[project.optional-dependencies]
connectors = [
    "PyGithub>=2.4",
    "atlassian-python-api>=3.41",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.7",
]

[project.scripts]
ttt = "ttt.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backend/ttt"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests"]
pythonpath = ["backend"]

[tool.ruff]
line-length = 100
target-version = "py312"
