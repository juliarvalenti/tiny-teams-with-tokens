name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + type + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: install
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check .

      - name: ty
        run: uv run ty check backend/ttt

      - name: pytest
        run: uv run pytest -x -q

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install
        run: npm ci

      - name: typecheck
        run: npx tsc --noEmit

      - name: build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
